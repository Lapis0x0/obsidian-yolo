name: Reconcile signed update distribution

on:
  workflow_dispatch:
    inputs:
      trigger_release_id:
        description: Published Release id that woke this reconcile
        required: false
        type: string
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

concurrency:
  group: distribution-publish
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reconcile GitHub Release state into signed metadata
        env:
          GH_TOKEN: ${{ github.token }}
          DISTRIBUTION_SIGNING_SECRET_KEY: ${{ secrets.DISTRIBUTION_SIGNING_SECRET_KEY }}
          TRIGGER_RELEASE_ID: ${{ inputs.trigger_release_id }}
        run: |
          args=(reconcile)
          if [[ -n "$TRIGGER_RELEASE_ID" ]]; then
            args+=(--trigger-release-id "$TRIGGER_RELEASE_ID")
          fi
          node scripts/distribution.mjs "${args[@]}"

      - name: Validate generated metadata
        run: |
          npx jest src/core/distribution --runInBand
          node --test scripts/release.test.mjs
          git diff --check

      - name: Detect metadata change
        id: metadata
        run: |
          if [[ -z "$(git status --porcelain -- distribution modules/catalog-v1.json)" ]]; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Publish signed Feed and old-client projection
        if: steps.metadata.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DISTRIBUTION_SIGNING_SECRET_KEY: ${{ secrets.DISTRIBUTION_SIGNING_SECRET_KEY }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          branch="${{ github.event.repository.default_branch }}"
          for attempt in 1 2 3; do
            if [[ "$attempt" -gt 1 ]]; then
              git fetch origin "$branch"
              git checkout --detach "origin/$branch"
              node scripts/distribution.mjs reconcile
              npx jest src/core/distribution/generatedDistribution.test.ts --runInBand
              git diff --check
            fi
            if [[ -z "$(git status --porcelain -- distribution modules/catalog-v1.json)" ]]; then
              exit 0
            fi
            git add distribution/feed-v1.json distribution/feed-v1.sig modules/catalog-v1.json
            revision="$(node -p "require('./distribution/feed-v1.json').revision")"
            git commit -m "chore(distribution): publish revision $revision"
            if git push origin "HEAD:$branch"; then
              exit 0
            fi
          done
          echo '::error::main advanced during all distribution publish attempts'
          exit 1

      - name: Purge old-client jsDelivr Catalog
        if: steps.metadata.outputs.changed == 'true'
        continue-on-error: true
        run: >-
          curl --fail --show-error --silent --retry 3 --retry-all-errors
          https://purge.jsdelivr.net/gh/Lapis0x0/obsidian-yolo@main/modules/catalog-v1.json

      - name: Check current Pages deployment
        id: pages
        continue-on-error: true
        run: node scripts/distribution.mjs verify-pages

      - name: Build latest-only Pages snapshot
        if: steps.pages.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/distribution.mjs build-pages

      - name: Deploy Cloudflare Pages snapshot
        if: steps.pages.outcome != 'success'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          npx wrangler pages deploy .distribution-pages
          --project-name yolo-updates --branch main

      - name: Verify deployed revision and assets
        if: steps.pages.outcome != 'success'
        run: node scripts/distribution.mjs verify-pages

      - name: Summarize distribution state
        run: |
          revision="$(node -p "require('./distribution/feed-v1.json').revision")"
          echo "### Distribution revision $revision" >> "$GITHUB_STEP_SUMMARY"
          echo '- GitHub Release archive: authoritative' >> "$GITHUB_STEP_SUMMARY"
          echo '- Signed GitHub Raw Feed: current' >> "$GITHUB_STEP_SUMMARY"
          echo '- Cloudflare Pages mirror: verified' >> "$GITHUB_STEP_SUMMARY"
