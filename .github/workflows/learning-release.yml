name: Validate and release Learning module

on:
  pull_request:
    paths:
      - '.github/workflows/learning-release.yml'
      - 'scripts/build-first-party-modules.mjs'
      - 'scripts/validate-learning-release.mjs'
      - 'scripts/verify-learning-release-assets.mjs'
      - 'scripts/verify-learning-release-assets.test.mjs'
      - 'modules/learning/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to validate; defaults to the package-derived tag'
        required: false
        type: string
  push:
    tags:
      - 'learning/v*'

permissions:
  contents: read

concurrency:
  group: learning-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LEARNING_RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check Learning
        run: npm --prefix modules/learning run typecheck

      - name: Test Learning
        run: npm --prefix modules/learning test

      - name: Build and validate release assets
        run: node scripts/validate-learning-release.mjs --build

      - name: Test remote Release asset verification
        run: node --test scripts/verify-learning-release-assets.test.mjs

      - name: Validate generated URLs against Core
        run: |
          export LEARNING_RELEASE_PARITY_INPUT="$(
            node -e "const manifest=require('./modules/learning/release/module.json'); process.stdout.write(JSON.stringify({version:manifest.version,urls:manifest.variants.flatMap(variant=>variant.files.map(file=>file.url))}))"
          )"
          npx jest src/core/modules/moduleReleaseUrl.test.ts --runInBand

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/learning/v')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
    outputs:
      release_id: ${{ steps.verify.outputs.release_id }}
      release_tag: ${{ steps.verify.outputs.release_tag }}
      release_url: ${{ steps.verify.outputs.release_url }}
      manifest_url: ${{ steps.verify.outputs.manifest_url }}
      manifest_byte_size: ${{ steps.verify.outputs.manifest_byte_size }}
      manifest_sha256: ${{ steps.verify.outputs.manifest_sha256 }}
      metadata_artifact: learning-release-metadata-${{ github.run_id }}
    env:
      LEARNING_RELEASE_TAG: ${{ github.ref_name }}
      LEARNING_RELEASE_OWNER: learning-release-owner:${{ github.run_id }}:${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package and validate release assets
        run: node scripts/validate-learning-release.mjs --build

      - name: Create draft GitHub Release
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_release_ids="$(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${LEARNING_RELEASE_TAG}\") | .id"
          )"
          if [[ -n "$existing_release_ids" ]]; then
            echo "::error::GitHub Release ${LEARNING_RELEASE_TAG} already exists; releases are immutable"
            exit 1
          fi

          release_body="$(
            printf '<!-- %s -->\n\n' "$LEARNING_RELEASE_OWNER"
            cat modules/learning/latest-release-note.md
          )"

          release="$(
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="$LEARNING_RELEASE_TAG" \
              -f name="$LEARNING_RELEASE_TAG" \
              -f target_commitish="$GITHUB_SHA" \
              -f body="$release_body" \
              -F draft=true \
              -F prerelease=false
          )"
          release_id="$(jq -r '.id' <<<"$release")"
          if [[ ! "$release_id" =~ ^[0-9]+$ ]]; then
            echo "::error::GitHub did not return a valid draft Release id"
            exit 1
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Upload draft Release assets without replacement
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$LEARNING_RELEASE_TAG" modules/learning/release/*

      - name: Read back and verify draft Release assets
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/verify-learning-release-assets.mjs \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$LEARNING_RELEASE_TAG" \
            --release-id "${{ steps.create.outputs.release_id }}" \
            --target-commit "$GITHUB_SHA" \
            --asset-dir modules/learning/release \
            --metadata-out learning-release-metadata.json

      - name: Preserve verified release metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: learning-release-metadata-${{ github.run_id }}
          path: learning-release-metadata.json
          if-no-files-found: error
          retention-days: 90

      - name: Publish verified GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${{ steps.create.outputs.release_id }}" \
            -F draft=false \
            --jq '.html_url'

      - name: Independently verify published Release assets
        id: published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/verify-learning-release-assets.mjs \
            --allow-published \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$LEARNING_RELEASE_TAG" \
            --release-id "${{ steps.create.outputs.release_id }}" \
            --target-commit "$GITHUB_SHA" \
            --asset-dir modules/learning/release \
            --metadata-out learning-release-published-metadata.json

      - name: Dispatch verified catalog update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run module-catalog.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f manifest_url="${{ steps.published.outputs.manifest_url }}" \
            -f module_id=learning \
            -f version="${{ steps.published.outputs.release_version }}"
          echo 'Dispatched module-catalog.yml; the verified release will be published directly to the official catalog.' >> "$GITHUB_STEP_SUMMARY"

      - name: Remove this run's failed draft Release
        if: ${{ failure() || cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/verify-learning-release-assets.mjs \
            --cleanup-owned-draft \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$LEARNING_RELEASE_TAG" \
            --release-id "${{ steps.create.outputs.release_id }}" \
            --target-commit "$GITHUB_SHA" \
            --owner-marker "$LEARNING_RELEASE_OWNER"
